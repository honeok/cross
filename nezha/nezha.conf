# https://www.nodeseek.com/post-30779-1

upstream grpcserver {
    server 127.0.0.1:5555;
    keepalive 1024;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  tz.baidu.com;
    return 301   https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    listen       443 quic;
    listen       [::]:443 quic;
    server_name  tz.baidu.com;

    resolver 1.1.1.1 8.8.8.8 223.5.5.5 valid=300s;
    resolver_timeout 5s;

    ssl_certificate      /etc/nginx/certs/baidu.com_cert.pem;
    ssl_certificate_key  /etc/nginx/certs/baidu.com_key.pem;

    underscores_in_headers on;

    keepalive_time 24h;
    keepalive_requests 100000;
    keepalive_timeout 120s;

    location / {
	    proxy_set_header Host $http_host;
	    proxy_set_header Upgrade $http_upgrade;

	    add_header Alt-Svc 'h3=":443"; ma=86400';
        proxy_pass http://127.0.0.1:8070;
    }

    location ~ ^/(ws|terminal/.+|file/.+)$ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;

	    add_header Alt-Svc 'h3=":443"; ma=86400';
        proxy_pass http://127.0.0.1:8070;
    }

    location ^~ /proto.NezhaService/ {
        access_log off;
        grpc_read_timeout 300s;
    	grpc_send_timeout 300s;
    	grpc_socket_keepalive on;
    	grpc_pass grpc://grpcserver;
    }
}