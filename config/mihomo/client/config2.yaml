## 全局配置
mixed-port: 7890
allow-lan: true
bind-address: "*"
skip-auth-prefixes:
  - 127.0.0.1/8
  - ::1/128
find-process-mode: strict
mode: rule
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: firefox
disable-keep-alive: false
keep-alive-idle: 600
keep-alive-interval: 1800

profile:
  store-selected: true
  store-fake-ip: true

## 时间同步配置
ntp:
  enable: false
  write-to-system: true
  server: time.apple.com
  port: 123
  interval: 30

## Tun配置
tun:
  enable: false
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true

## DNS模块
dns:
  cache-algorithm: arc
  enable: true
  listen: :53
  default-nameserver:
    - tls://1.12.12.12:853
    - tls://223.5.5.5:853
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:fakeip_domain
  fake-ip-filter-mode: blacklist
  respect-rules: true
  nameserver:
    - https://one.one.one.one/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    "rule-set:direct_domain,private_domain":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query

## 节点信息
proxies:
  # 链式代理流量走向机制 丨 Mihomo本机 <-> 前置节点 <-> 落地节点 <-> Internet互联网
  - name: "🇸🇬 狮城链式"
    dialer-proxy: "🇸🇬 狮城自动"
    type: socks5
    server: "1.1.1.1"
    port: 1080
    username: "socks"
    password: "socks"

  # Shadowsocks
  # cipher支持:
  # aes-128-gcm aes-192-gcm aes-256-gcm
  # aes-128-cfb aes-192-cfb aes-256-cfb
  # aes-128-ctr aes-192-ctr aes-256-ctr
  # rc4-md5 chacha20-ietf xchacha20
  # chacha20-ietf-poly1305 xchacha20-ietf-poly1305
  # 2022-blake3-aes-128-gcm 2022-blake3-aes-256-gcm 2022-blake3-chacha20-poly1305
  - name: "🇭🇰 香港链式"
    dialer-proxy: "🇭🇰 香港自动"
    type: ss
    server: "1.0.0.1"
    port: 8388
    cipher: "aes-128-gcm"
    password: "shadowsocks"

## 机场通用配置模板
airport_conf: &airport_conf
  type: http
  interval: 3600
  proxy: DIRECT
  lazy: true
  health-check:
    enable: true
    interval: 300
    url: "http://www.gstatic.com/generate_204"
    expected-status: 204

Airports: &airports
  use:
    - Airport1
    - Airport2

proxy-providers:
  Airport1:
    <<: *airport_conf
    url: "url1"
  Airport2:
    <<: *airport_conf
    url: "url2"

## 代理分组锚点
main: &main { type: select, include-all: true, proxies: [🚀 默认代理, ♻️ 自动选择, 🇭🇰 香港自动, 🇹🇼 台湾自动, 🇸🇬 狮城自动, 🇯🇵 日本自动, 🇺🇸 美国自动, 🇳🇱 荷兰自动, 🇩🇪 德国自动, DIRECT] }
proxy: &proxy { type: select, include-all: true, proxies: [🚀 默认代理, ♻️ 自动选择, 🇭🇰 香港自动, 🇹🇼 台湾自动, 🇸🇬 狮城自动, 🇯🇵 日本自动, 🇺🇸 美国自动, 🇳🇱 荷兰自动, 🇩🇪 德国自动] }
specific: &specific { type: select, include-all: true, proxies: [🚀 默认代理, ♻️ 自动选择, 🇹🇼 台湾自动, 🇸🇬 狮城自动, 🇯🇵 日本自动, 🇺🇸 美国自动, 🇳🇱 荷兰自动, 🇩🇪 德国自动], <<: *airports, filter: "^((?!(?i)(🇭🇰|香港|hk|hong\\s?kong|🇲🇴|澳门|澳門|macau|macao|🇷🇺|俄罗斯|ru|russia|🇨🇳|中国|回国|china|cn)).)*$" }
island: &island { type: select, proxies: [DIRECT], <<: *airports, filter: "(?i)(🇭🇰|香港|hk|hong\\s?kong|🇲🇴|澳门|澳門|macau|macao|🇹🇼|台湾|tw|taiwan)" }

## 代理分组
proxy-groups:
  #------------------------基础分组------------------------#
  - { name: 🚀 默认代理, type: select, include-all: true, proxies: [♻️ 自动选择, 🇭🇰 香港自动, 🇹🇼 台湾自动, 🇸🇬 狮城自动, 🇯🇵 日本自动, 🇺🇸 美国自动, 🇳🇱 荷兰自动, 🇩🇪 德国自动] }
  - { name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 100, interval: 300 }

  #------------------------场景分组------------------------#
  - { name: 🤖 AI, <<: *specific }
  - { name: 🍀 Google, <<: *proxy }
  - { name: 👨‍💻 GitHub, <<: *proxy }
  - { name: 🦊 GitLab, <<: *proxy }
  - { name: 🐳 Docker, <<: *proxy }
  - { name: 🪟 Microsoft, <<: *main }
  - { name: 🐬 OneDrive, <<: *main }
  - { name: 📲 Telegram, <<: *proxy }
  - { name: 🐦 Twitter, <<: *proxy }
  - { name: 📺 BiliBili, <<: *island }
  - { name: 🎥 NETFLIX, <<: *specific }
  - { name: 🎧 Spotify, <<: *island }
  - { name: 🎵 TikTok, <<: *specific }
  - { name: 💶 PayPal, <<: *main }
  - { name: ✈️ Speedtest, <<: *main }
  - { name: 🍎 Apple, <<: *main }

  #------------------------地区分组------------------------#
  - { name: 🇭🇰 香港自动, type: url-test, <<: *airports, include-all: true, tolerance: 100, interval: 300, filter: "(?i)(🇭🇰|香港|hk|hong\\s?kong)" }
  - { name: 🇹🇼 台湾自动, type: url-test, <<: *airports, include-all: true, tolerance: 100, interval: 300, filter: "(?i)(🇹🇼|台湾|tw|taiwan)" }
  - { name: 🇸🇬 狮城自动, type: url-test, <<: *airports, include-all: true, tolerance: 100, interval: 300, filter: "(?i)(🇸🇬|新加坡|sg|singapore|lion\\s?city)" }
  - { name: 🇯🇵 日本自动, type: url-test, <<: *airports, include-all: true, tolerance: 100, interval: 300, filter: "(?i)(🇯🇵|日本|jp|japan|tokyo|osaka)" }
  - { name: 🇺🇸 美国自动, type: url-test, <<: *airports, include-all: true, tolerance: 100, interval: 300, filter: "(?i)(🇺🇸|美国|us|united\\s?states|america)" }
  - { name: 🇳🇱 荷兰自动, type: url-test, <<: *airports, include-all: true, tolerance: 100, interval: 300, filter: "(?i)(🇳🇱|荷兰|nl|netherlands|amsterdam)" }
  - { name: 🇩🇪 德国自动, type: url-test, <<: *airports, include-all: true, tolerance: 100, interval: 300, filter: "(?i)(🇩🇪|德国|de|germany|frankfurt)" }

  #------------------------特殊分组------------------------#
  - { name: 🎯 全球直连, type: select, proxies: [DIRECT, 🚀 默认代理] }
  - { name: 🎣 漏网之鱼, <<: *main }

## 规则匹配
rules:
  # 本地局域网
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT

  # 广告拦截
  - RULE-SET,ad_domain,REJECT

  - RULE-SET,direct_list,DIRECT
  - RULE-SET,meituan_list,DIRECT

  # 应用分流
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,applecn_domain,🍎 Apple
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,googlecn_domain,🍀 Google
  - RULE-SET,ai_domain,🤖 AI
  - RULE-SET,github_domain,👨‍💻 GitHub
  - RULE-SET,gitlab_domain,🦊 GitLab
  - RULE-SET,docker_domain, 🐳 Docker
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,twitter_domain,🐦 Twitter
  - RULE-SET,bilibili_domain,📺 BiliBili
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,spotify_domain,🎧 Spotify
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,paypal_domain,💶 PayPal
  - RULE-SET,speedtest_domain,✈️ Speedtest

  - RULE-SET,proxy_domain,🚀 默认代理
  - RULE-SET,gfw_domain,🚀 默认代理
  - RULE-SET,tldnotcn_domain,🚀 默认代理
  - RULE-SET,direct_domain,🎯 全球直连

  - RULE-SET,apple_ip,🍎 Apple,no-resolve
  - RULE-SET,google_ip,🍀 Google,no-resolve
