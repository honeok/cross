---
name: "Run actionlint"

on:
  push:
    branches: ["*"]
    paths: [".github/workflows/**"]
  pull_request:
    paths: [".github/workflows/**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TZ: Asia/Shanghai

jobs:
  actionlint:
    name: "Run actionlint"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Run actionlint"
        id: actionlint
        uses: raven-actions/actionlint@v2
        with:
          matcher: true
          group-result: false
          fail-on-error: true
          shellcheck: true
          pyflakes: true
          cache: true
          github-token: ${{ github.token }}

      - name: "Actionlint summary"
        if: steps.actionlint.outputs.exit-code != 0
        run: |
          printf '[%s] %s\n' "$(date '+%F %T')" "Actionlint version: ${{ steps.actionlint.outputs.version-semver }}"
          printf '[%s] %s\n' "$(date '+%F %T')" "Actionlint ended because: ${{ steps.actionlint.outputs.exit-message }}"
          printf '[%s] %s\n' "$(date '+%F %T')" "Actionlint found errors: ${{ steps.actionlint.outputs.total-errors }}"
          printf '[%s] %s\n' "$(date '+%F %T')" "Actionlint checked files: ${{ steps.actionlint.outputs.total-files }}"
          printf '[%s] %s\n' "$(date '+%F %T')" "Actionlint cache used: ${{ steps.actionlint.outputs.cache-hit }}"
          # shellcheck disable=SC2242
          exit ${{ steps.actionlint.outputs.exit-code }}
