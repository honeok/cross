name: CI

on:
  push:
    paths:
      - '*.sh'
      - '**/*.sh'
  pull_request:
    paths:
      - '*.sh'
      - '**/*.sh'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          # 安装 shellcheck
          if ! command -v shellcheck > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi

      - name: Get modified .sh files
        id: changes
        run: |
          # 查找当前工作区（不包括未暂存的变更）中修改或新增的 .sh 文件
          CHANGED_FILES=$(git diff --name-only --diff-filter=AM HEAD | grep -E '\.sh$' || true)

          # 如果没有修改的 .sh 文件，跳过
          if [ -z "$CHANGED_FILES" ]; then
            echo "No .sh files changed, skipping shellcheck."
            exit 0
          fi

          # 输出变动的文件列表
          echo "Modified .sh files: $CHANGED_FILES"
          echo "$CHANGED_FILES" > changed_files.txt

      - name: Lint modified .sh files
        run: |
          # 对变动的 .sh 文件执行 shellcheck
          if [ -f changed_files.txt ]; then
            cat changed_files.txt | xargs -I {} shellcheck {}
          fi
