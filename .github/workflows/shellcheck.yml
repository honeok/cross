name: CI

on:
  push:
    paths:
      - '*.sh'
      - '**/*.sh'
  pull_request:
    paths:
      - '*.sh'
      - '**/*.sh'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          # 安装 shellcheck
          if ! command -v shellcheck > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi

      - name: Find and lint modified or new .sh files
        run: |
          # 获取当前提交的 SHA
          current_commit=$GITHUB_SHA

          # 获取当前提交的父提交 SHA
          parent_commit=$(git log --format=%H -n 1 $current_commit^ || echo "no-parent")

          if [ "$parent_commit" = "no-parent" ]; then
            # 如果没有父提交（比如第一次提交），直接使用当前提交进行检查
            echo "No parent commit found, checking all .sh files in this commit..."
            modified_files=$(git diff --name-only $current_commit -- '*.sh' '**/*.sh')
          else
            # 如果有父提交，比较父提交和当前提交的差异
            echo "Parent commit found, checking .sh files modified between commits..."
            modified_files=$(git diff --name-only $parent_commit..$current_commit -- '*.sh' '**/*.sh')
          fi

          # 如果有修改的 .sh 文件，进行 shellcheck 检查
          if [ -n "$modified_files" ]; then
            echo "Modified or new .sh files found, running shellcheck..."
            echo "$modified_files" | xargs -I {} shellcheck {}
          else
            echo "No .sh files modified or added."
          fi
