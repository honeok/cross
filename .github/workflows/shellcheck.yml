name: CI

on:
  push:
    paths:
      - '*.sh'
      - '**/*.sh'
  pull_request:
    paths:
      - '*.sh'
      - '**/*.sh'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          if ! command -v shellcheck > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi

      - name: Find recently modified .sh files
        run: |
          # 获取当前时间戳（使用本地时区，比如上海时间）
          current_time=$(TZ='Asia/Shanghai' date +%s)
          # 查找过去10秒钟内修改的 .sh 文件
          find . -type f -name "*.sh" -newermt "$(date -d @$((current_time - 10)) +"%Y-%m-%d %H:%M:%S")" | while read file; do
            echo "Checking file: $file"
            shellcheck "$file"
          done
