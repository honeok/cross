name: CI

on:
  push:
    paths:
      - '*.sh'
      - '**/*.sh'
  pull_request:
    paths:
      - '*.sh'
      - '**/*.sh'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          # 安装 shellcheck
          if ! command -v shellcheck > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi

      - name: Get the current time and UTC time
        id: time_info
        run: |
          # 获取当前时间（本地时间）
          current_time=$(date '+%Y-%m-%d %H:%M:%S')
          # 获取当前时间的UTC时间
          utc_time=$(date -u '+%Y-%m-%d %H:%M:%S')
          
          echo "Current time: $current_time"
          echo "UTC time: $utc_time"
          
          # 获取当前时间戳（Unix时间戳）
          current_timestamp=$(date -d "$current_time" +%s)
          utc_timestamp=$(date -d "$utc_time" +%s)

          # 获取10秒之前的时间戳
          ten_seconds_ago=$((current_timestamp - 10))

          # 将时间戳存储为环境变量
          echo "current_timestamp=$current_timestamp" >> $GITHUB_ENV
          echo "ten_seconds_ago=$ten_seconds_ago" >> $GITHUB_ENV
          echo "utc_timestamp=$utc_timestamp" >> $GITHUB_ENV
          
      - name: Find and lint recently modified .sh files
        run: |
          # 查找 10 秒钟内更新或新增的 .sh 文件并进行 shellcheck
          find . -type f -name "*.sh" -newermt "@${{ env.ten_seconds_ago }}" -exec shellcheck {} \;
