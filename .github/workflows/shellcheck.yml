name: CI

on:
  push:
    paths:
      - '**/*.sh'
    branches:
      - "*"
  pull_request:
    paths:
      - '**/*.sh'
    branches:
      - "*"
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          # 安装shellcheck
          if ! command -v shellcheck > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi

      - name: Get changed .sh files
        id: changes
        run: |
          # 获取本次推送中所有修改或新增的.sh文件
          CHANGED_FILES=$(git diff --name-only $GITHUB_SHA $GITHUB_SHA^ | grep '\.sh$')
          
          [ -z "$CHANGED_FILES" ] && exit 0
          echo "$CHANGED_FILES" > changed_files.txt

      - name: Lint changed .sh files
        run: |
          # 遍历所有修改过的.sh文件并进行check
          [ -f changed_files.txt ] && cat changed_files.txt | xargs -I {} shellcheck {}