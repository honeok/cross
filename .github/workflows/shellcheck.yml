name: CI

on:
  push:
    paths:
      - '*.sh'
      - '**/*.sh'
  pull_request:
    paths:
      - '*.sh'
      - '**/*.sh'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          # 安装shellcheck
          if ! command -v shellcheck > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi

      - name: Get changed .sh files
        id: changes
        run: |
          # 获取当前提交与前一个提交的差异文件列表
          CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD)
          # 获取本次推送中所有修改或新增的.sh文件
          CHANGED_SH_FILES=$(echo "$CHANGED_FILES" | grep -E '\.sh$')
          
          [ -z "$CHANGED_SH_FILES" ] && exit 0

      - name: Lint changed .sh files
        run: |
          # 遍历所有修改过的.sh文件并进行check
          for file in $CHANGED_SH_FILES; do
            shellcheck "$file"
          done