name: CI

on:
  push:
    paths:
      - '*.sh'
      - '**/*.sh'
  pull_request:
    paths:
      - '*.sh'
      - '**/*.sh'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          # 安装 shellcheck
          if ! command -v shellcheck > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi

      - name: Get current UTC time
        id: current_time
        run: |
          # 获取当前 UTC 时间
          current_time=$(date -u '+%Y-%m-%d %H:%M:%S')
          echo "Current UTC time: $current_time"
          echo "current_time=$current_time" >> $GITHUB_ENV

      - name: Find and lint recently modified .sh files
        run: |
          # 查找最近 10 秒钟内更新或新增的 .sh 文件，并检查
          find . -type f -name "*.sh" -newermt "${{ env.current_time }}" -exec shellcheck {} \;
