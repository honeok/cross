name: CI

on:
  push:
    paths:
      - '*.sh'
      - '**/*.sh'
  pull_request:
    paths:
      - '*.sh'
      - '**/*.sh'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          # 安装 shellcheck
          if ! command -v shellcheck > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi

      - name: Find and lint recently modified .sh files
        run: |
          # 查找最近 10 秒钟内更新或新增的 .sh 文件，并检查
          find . -type f -name "*.sh" -newermt "$(date --date='10 seconds ago' '+%Y-%m-%d %H:%M:%S')" -exec shellcheck {} \;
